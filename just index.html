body{

/* Overlay */
.overlay{
    background: rgba(0,0,0,0.7);
    min-height:100vh;
}

/* Container */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px;
}

/* Profile */
.profile img{
    width:140px;
    height:140px;
    border-radius:50%;
    border:3px solid #00f2fe;
    box-shadow:0 0 25px #00f2fe;
    transition:0.4s;
}
.profile img:hover{
    transform:scale(1.1);
}

/* Header */
.header{
    text-align:center;
    margin:20px;
}

.header h1{
    font-size:35px;
    color:#00f2fe;
}

/* Cards */
.card{
    width:90%;
    max-width:800px;
    padding:20px;
    margin:15px;
    border-radius:15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    transition:0.4s;
}

.card:hover{
    transform:scale(1.03);
}

/* Buttons */
.btn{
    display:inline-block;
    padding:10px 15px;
    margin:5px;
    border-radius:8px;
    background:#00f2fe;
    color:black;
    text-decoration:none;
    font-weight:bold;
}

/* Skills */
.progress{
    height:10px;
    background:#333;
    border-radius:5px;
    margin-bottom:10px;
}
.progress div{
    height:100%;
    background:#00f2fe;
</style>
